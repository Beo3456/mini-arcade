[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/functions/xiangqi.cjs", "netlify/functions/chess.cjs"]

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"

[[headers]]
  for = "/vendor/*.mjs"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"
