[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/functions/xiangqi.cjs"]

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
